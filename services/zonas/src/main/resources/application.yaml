spring:
  application:
    name: zonas
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zonas}
    username: postgres
    password: postgres
  sql:
    init:
      mode: never
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    delimiter: "@@"
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
app:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:file:/run/secrets/jwt-public.pem}
    issuer: ${JWT_ISSUER:gateway-distribuidas}
    audience: ${JWT_AUDIENCE:parking-api}
