spring.datasource.url=jdbc:h2:mem:usuarios_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
app.bootstrap.enabled=false
app.jwt.private-key=classpath:test-private.pem
app.jwt.public-key=classpath:test-public.pem
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
