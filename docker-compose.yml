services:
  usuarios-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${USUARIOS_DB}
    volumes:
      - usuarios-data:/var/lib/postgresql
    networks: [usuarios-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${USUARIOS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  zonas-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ZONAS_DB}
    volumes:
      - zonas-data:/var/lib/postgresql/data
    networks: [zonas-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ZONAS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  vehiculos-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${VEHICULOS_DB}
    volumes:
      - vehiculos-data:/var/lib/postgresql/data
    networks: [vehiculos-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${VEHICULOS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  asignaciones-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ASIGNACIONES_DB}
    volumes:
      - asignaciones-data:/var/lib/postgresql/data
    networks: [asignaciones-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ASIGNACIONES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  tickets-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${TICKETS_DB}
    volumes:
      - tickets-data:/var/lib/postgresql/data
    networks: [tickets-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${TICKETS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  audit-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUDIT_DB}
    volumes:
      - audit-data:/var/lib/postgresql/data
    networks: [audit-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${AUDIT_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [gateway]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  usuarios:
    build: ./services/usuarios
    environment:
      DB_URL: jdbc:postgresql://usuarios-db:5432/${USUARIOS_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_PRIVATE_KEY: file:/run/secrets/jwt-private.pem
      JWT_PUBLIC_KEY: file:/run/secrets/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_DNI: ${ADMIN_DNI}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit_event
    volumes:
      - ./.secrets/jwt-private.pem:/run/secrets/jwt-private.pem:ro
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [gateway, usuarios-db]
    depends_on:
      usuarios-db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  zonas:
    build: ./services/zonas
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://zonas-db:5432/${ZONAS_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_PUBLIC_KEY: file:/run/secrets/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit_event
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [gateway, zonas-db]
    depends_on:
      zonas-db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  vehiculos:
    build: ./services/vehiculos
    environment:
      DB_HOST: vehiculos-db
      DB_PORT: 5432
      DB_USUARIO: ${POSTGRES_USER}
      DB_CONTRASENA: ${POSTGRES_PASSWORD}
      DB_NOMBRE: ${VEHICULOS_DB}
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit_event
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [gateway, vehiculos-db]
    depends_on:
      vehiculos-db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  asignaciones:
    build: ./services/asignaciones
    environment:
      DB_HOST: asignaciones-db
      DB_PORT: 5432
      DB_USUARIO: ${POSTGRES_USER}
      DB_CONTRASENA: ${POSTGRES_PASSWORD}
      DB_NOMBRE: ${ASIGNACIONES_DB}
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      USUARIOS_INTERNAL_URL: http://usuarios:8080
      VEHICULOS_INTERNAL_URL: http://vehiculos:3000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit_event
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [gateway, asignaciones-db]
    depends_on:
      asignaciones-db: { condition: service_healthy }
      usuarios: { condition: service_healthy }
      vehiculos: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  tickets:
    build: ./services/tickets
    environment:
      DB_HOST: tickets-db
      DB_PORT: 5432
      DB_USUARIO: ${POSTGRES_USER}
      DB_CONTRASENA: ${POSTGRES_PASSWORD}
      DB_NOMBRE: ${TICKETS_DB}
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      VEHICULOS_INTERNAL_URL: http://vehiculos:3000
      ASIGNACIONES_INTERNAL_URL: http://asignaciones:3000
      ZONAS_INTERNAL_URL: http://zonas:8080
      TICKET_RATE_MOTO: ${TICKET_RATE_MOTO}
      TICKET_RATE_AUTO: ${TICKET_RATE_AUTO}
      TICKET_RATE_CAMIONETA: ${TICKET_RATE_CAMIONETA}
      TICKET_RATE_BUS: ${TICKET_RATE_BUS}
      TICKET_SPACE_FACTOR_MOTO: ${TICKET_SPACE_FACTOR_MOTO}
      TICKET_SPACE_FACTOR_AUTO: ${TICKET_SPACE_FACTOR_AUTO}
      TICKET_SPACE_FACTOR_BUS: ${TICKET_SPACE_FACTOR_BUS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit_event
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [gateway, tickets-db]
    depends_on:
      tickets-db: { condition: service_healthy }
      zonas: { condition: service_healthy }
      vehiculos: { condition: service_healthy }
      asignaciones: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  ms-audit:
    build: ./services/ms-audit
    environment:
      DB_HOST: audit-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${AUDIT_DB}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit_event
      RABBITMQ_DEAD_LETTER_EXCHANGE: audit_dead_exchange
    networks: [gateway, audit-db]
    depends_on:
      audit-db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  kong:
    image: kong:3.9.1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_ADMIN_LISTEN: "off"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "8000:8000"
    networks: [gateway]
    depends_on:
      usuarios: { condition: service_healthy }
      zonas: { condition: service_healthy }
      vehiculos: { condition: service_healthy }
      asignaciones: { condition: service_healthy }
      tickets: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build: ./web
    ports:
      - "9000:9000"
    networks: [gateway]
    depends_on:
      kong: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  usuarios-data:
  zonas-data:
  vehiculos-data:
  asignaciones-data:
  tickets-data:
  audit-data:
  rabbitmq-data:

networks:
  gateway:
  usuarios-db:
    internal: true
  zonas-db:
    internal: true
  vehiculos-db:
    internal: true
  asignaciones-db:
    internal: true
  tickets-db:
    internal: true
  audit-db:
    internal: true
