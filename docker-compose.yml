services:
  usuarios-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${USUARIOS_DB}
    volumes:
      - usuarios-data:/var/lib/postgresql
    networks: [usuarios-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${USUARIOS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  zonas-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ZONAS_DB}
    volumes:
      - zonas-data:/var/lib/postgresql/data
    networks: [zonas-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ZONAS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  vehiculos-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${VEHICULOS_DB}
    volumes:
      - vehiculos-data:/var/lib/postgresql/data
    networks: [vehiculos-db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${VEHICULOS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  usuarios:
    build: ./services/usuarios
    environment:
      DB_URL: jdbc:postgresql://usuarios-db:5432/${USUARIOS_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_PRIVATE_KEY: file:/run/secrets/jwt-private.pem
      JWT_PUBLIC_KEY: file:/run/secrets/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_DNI: ${ADMIN_DNI}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./.secrets/jwt-private.pem:/run/secrets/jwt-private.pem:ro
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [gateway, usuarios-db]
    depends_on:
      usuarios-db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  zonas:
    build: ./services/zonas
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://zonas-db:5432/${ZONAS_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_PUBLIC_KEY: file:/run/secrets/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [gateway, zonas-db]
    depends_on:
      zonas-db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  vehiculos:
    build: ./services/vehiculos
    environment:
      DB_HOST: vehiculos-db
      DB_PORT: 5432
      DB_USUARIO: ${POSTGRES_USER}
      DB_CONTRASENA: ${POSTGRES_PASSWORD}
      DB_NOMBRE: ${VEHICULOS_DB}
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    volumes:
      - ./.secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [gateway, vehiculos-db]
    depends_on:
      vehiculos-db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  kong:
    image: kong:3.9.1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_ADMIN_LISTEN: "off"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "8000:8000"
    networks: [gateway]
    depends_on:
      usuarios: { condition: service_healthy }
      zonas: { condition: service_healthy }
      vehiculos: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  usuarios-data:
  zonas-data:
  vehiculos-data:

networks:
  gateway:
  usuarios-db:
    internal: true
  zonas-db:
    internal: true
  vehiculos-db:
    internal: true
